<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal App | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Admin Control Panel</a>
        <div class="d-flex gap-2">
            <a href="/Journal/dashboard.html" class="btn btn-outline-light btn-sm">My Journals</a>
            <button class="btn btn-dark btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>User Management</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createAdminModal">
            + Create New Admin
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Username</th>
                    <th>Roles</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="user-table-body">
                <tr><td colspan="3" class="text-center">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="createAdminModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Create Admin User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createAdminForm">
                    <div class="mb-3">
                        <label class="form-label">New Admin Username</label>
                        <input type="text" id="adminUsername" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="adminPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Create Admin</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. FRONTEND SECURITY GUARD
    // Check if user is logged in AND has the ADMIN role
    const auth = localStorage.getItem('journal_auth');
    const rolesString = localStorage.getItem('journal_roles');

    if (!auth || !rolesString || !JSON.parse(rolesString).includes('ADMIN')) {
        alert("Access Denied. You are not an administrator.");
        window.location.href = '/Journal/index.html'; // Kick them out
    }

    // 2. FETCH ALL USERS (GET /admin/all-users)
    async function loadAllUsers() {
        try {
            const response = await fetch('/Journal/admin/all-users', {
                method: 'GET',
                headers: { 'Authorization': auth }
            });

            if (response.ok) {
                const users = await response.json();
                const tbody = document.getElementById('user-table-body');

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td class="fw-bold">${user.userName}</td>
                        <td>
                            ${user.roles.map(role =>
                                `<span class="badge ${role === 'ADMIN' ? 'bg-danger' : 'bg-secondary'}">${role}</span>`
                            ).join(' ')}
                        </td>
                        <td><span class="badge bg-success">Active</span></td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('user-table-body').innerHTML =
                    `<tr><td colspan="3" class="text-center text-danger">Failed to load users.</td></tr>`;
            }
        } catch (error) {
            console.error("Error loading users:", error);
        }
    }

    // 3. CREATE NEW ADMIN (POST /admin/create-admin)
    document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const newUser = {
            userName: document.getElementById('adminUsername').value,
            password: document.getElementById('adminPassword').value
        };

        try {
            const response = await fetch('/Journal/admin/create-admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': auth
                },
                body: JSON.stringify(newUser)
            });

            if (response.ok) {
                alert("Admin created successfully!");
                window.location.reload(); // Refresh page to see new user in the table
            } else {
                alert("Failed to create admin. Username might already exist.");
            }
        } catch (error) {
            console.error("Error creating admin:", error);
        }
    });

    // 4. LOGOUT
    function logout() {
        localStorage.removeItem('journal_auth');
        localStorage.removeItem('journal_roles');
        window.location.href = '/Journal/index.html';
    }

    // Automatically load users when the page opens
    window.onload = loadAllUsers;
</script>
</body>
</html>
