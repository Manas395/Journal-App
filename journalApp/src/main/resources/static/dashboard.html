<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Journal | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">My Journal App</span>
        <div>
            <a href="/Journal/admin.html" id="adminPanelBtn" class="btn btn-warning d-none me-2">Admin Panel</a>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Your Entries</h2>
        <a href="editor.html" class="btn btn-primary">+ New Entry</a>
    </div>

    <!-- 🏆 IDEAL LOCATION: Filter Section placed above the grid contents -->
    <div class="filter-container p-3 bg-white rounded shadow-sm mb-4">
        <div class="row align-items-center g-2">
            <div class="col-auto">
                <label for="journalDatePicker" class="fw-bold text-muted col-form-label">Filter by Date:</label>
            </div>
            <div class="col-auto">
                <input type="date" id="journalDatePicker" class="form-control form-control-sm">
            </div>
            <div class="col-auto">
                <button id="filterBtn" class="btn btn-primary btn-sm px-3" onclick="loadJournals()">Apply Filter</button>
                <button id="clearBtn" class="btn btn-secondary btn-sm px-3" onclick="clearDateFilter()">Clear</button>
            </div>
        </div>
    </div>

    <!-- Journal Cards Container -->
    <div id="journal-container" class="row">
        <!-- Dynamic cards load here -->
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Entry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" id="edit-title" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea id="edit-content" class="form-control" rows="5"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" onclick="updateEntry()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
