<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal App | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 card shadow-sm p-4">
            <h2 class="text-center mb-4">Login</h2>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <p class="mt-3 text-center">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
</div>

<script>
    // We listen for the user to click the "Login" button
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents the page from refreshing

        // Get the values the user typed in
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // 1. Create the Security Key
        const authString = 'Basic ' + btoa(username + ':' + password);

        try {
            // 2. Call the Backend (Make sure your UserController has this /me endpoint!)
            const response = await fetch('/Journal/user/me', {
                method: 'GET',
                headers: { 'Authorization': authString }
            });

            // 3. Check the Result
            if (response.ok) {
                const userData = await response.json();

                // 4. Save the Session State
                localStorage.setItem('journal_auth', authString);
                localStorage.setItem('journal_roles', JSON.stringify(userData.roles));

                // 5. The "Traffic Cop" (Role-Based Routing)
                if (userData.roles && userData.roles.includes('ADMIN')) {
                    window.location.href = '/Journal/admin.html'; // Direct to admin panel
                } else {
                    window.location.href = '/Journal/dashboard.html'; // Direct to normal dashboard
                }
            } else {
                // 6. Handle Failures
                alert("Invalid credentials! Please check your username and password.");
            }
        } catch (error) {
            console.error("Login error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>
</body>
</html>
