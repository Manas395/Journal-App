<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal App | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="text-center mb-4">Welcome Back</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login to Journal</button>
            </form>
            <div id="message" class="mt-3 text-danger text-center"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Simple Auth storage for demo purposes
        const authHeader = 'Basic ' + btoa(user + ':' + pass);

        // Verify credentials with a simple test call to your backend
        const response = await fetch('/Journal/journal', {
            headers: { 'Authorization': authHeader }
        });

        if (response.ok) {
            localStorage.setItem('journal_auth', authHeader);
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('message').innerText = "Invalid credentials. Try again.";
        }
    });
</script>
</body>
</html>
