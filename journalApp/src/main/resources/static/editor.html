<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Journal Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">← Back to Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3>Create New Entry</h3>
            <hr>
            <form id="entryForm">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Today's highlight..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea id="content" class="form-control" rows="10" placeholder="Start writing..." required></textarea>
                </div>
                <button type="submit" class="btn btn-success">Save Entry</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('entryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const auth = localStorage.getItem('journal_auth');

        const entry = {
            title: document.getElementById('title').value,
            content: document.getElementById('content').value
        };

        const response = await fetch('/Journal/journal', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': auth
            },
            body: JSON.stringify(entry)
        });

        if (response.ok) {
            alert("Entry saved successfully!");
            window.location.href = 'dashboard.html';
        } else {
            alert("Failed to save. Check your connection.");
        }
    });
</script>
</body>
</html>
